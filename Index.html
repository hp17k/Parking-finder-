<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T8 Parking Community</title>
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; padding: 20px; }
        .hero { text-align: center; margin-bottom: 20px; }
        .station-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .lot-name { font-weight: 800; font-size: 17px; }
        .prob-bar { height: 8px; background: #eee; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .prob-fill { height: 100%; background: var(--primary); width: 0%; transition: 1s; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>T8 Community Parking</h1>
        <p>Contribute status to help fellow commuters.</p>
    </div>

    <div id="app-container"></div>

    <script>
        // Data Structure for the Community
        const stations = [
            { station: "Macarthur", lots: ["Menangle Rd", "Gilchrist Dr"] },
            { station: "Campbelltown", lots: ["Farrow Multi-Deck", "Hurley St"] },
            // ... (Add your others here)
        ];

        function getProbability(lotId) {
            // Logic: Calculates % full based on saved community reports
            let count = parseInt(localStorage.getItem(lotId + '_reports') || 0);
            return Math.min(count * 20, 100); // Simple example: each report adds 20% certainty
        }

        function reportStatus(lotId, type) {
            if(type === 'full') {
                let current = parseInt(localStorage.getItem(lotId + '_reports') || 0);
                localStorage.setItem(lotId + '_reports', current + 1);
            }
            alert("Report submitted! Thanks for helping the T8 community.");
            render();
        }

        function render() {
            const container = document.getElementById('app-container');
            container.innerHTML = '';
            stations.forEach(s => {
                let card = document.createElement('div'); card.className = 'station-card';
                card.innerHTML = `<h3>${s.station}</h3>`;
                s.lots.forEach(l => {
                    let prob = getProbability(l);
                    card.innerHTML += `
                        <div class="lot-name">${l}</div>
                        <div class="prob-bar"><div class="prob-fill" style="width:${prob}%"></div></div>
                        <small>Fullness Probability: ${prob}%</small>
                        <div class="btn-group">
                            <button class="btn" style="background:#eee" onclick="reportStatus('${l}','available')">Available</button>
                            <button class="btn" style="background:#ff3b30; color:white" onclick="reportStatus('${l}','full')">Report Full</button>
                        </div>
                    `;
                });
                container.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
