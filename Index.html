<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T8 Parking Community</title>
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; 
                --empty: #34c759; --avail: #5856d6; --almost: #ffcc00; --full: #ff3b30; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; padding: 20px; }
        .station-card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .lot-name { font-weight: 700; font-size: 16px; margin-bottom: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; color: white; }
    </style>
</head>
<body>
    <h1>T8 Community Parking</h1>
    <div id="app-container"></div>
    <script>
        const stations = [
            { station: "Macarthur", lots: ["Menangle Rd Lot", "Gilchrist Dr Lot"] },
            { station: "Campbelltown", lots: ["Farrow Multi-Deck", "Farrow Outside Lot", "Hurley St Lot"] },
            { station: "Leumeah", lots: ["Plowman St Lot", "Old Leumeah Rd Lot"] },
            { station: "Minto", lots: ["Somerset St Lot", "Minto Rd West Lot"] },
            { station: "Ingleburn", lots: ["First Ave Multi-Storey", "Nardoo St Lot"] },
            { station: "Glenfield", lots: ["Railway Parade East", "Roy Watts Rd West"] }
        ];

        function report(lot, status) {
            localStorage.setItem(lot, status);
            alert("Reported: " + status);
            render();
        }

        function render() {
            const container = document.getElementById('app-container');
            container.innerHTML = '';
            stations.forEach(s => {
                let card = document.createElement('div'); card.className = 'station-card';
                card.innerHTML = `<h3>${s.station}</h3>`;
                s.lots.forEach(l => {
                    let cur = localStorage.getItem(l) || 'Not Reported';
                    card.innerHTML += `
                        <div class="lot-name">${l} (Status: ${cur})</div>
                        <div class="btn-grid">
                            <button class="btn" style="background:var(--empty)" onclick="report('${l}','Empty')">Empty</button>
                            <button class="btn" style="background:var(--avail)" onclick="report('${l}','Available')">Available</button>
                            <button class="btn" style="background:var(--almost)" onclick="report('${l}','Almost Full')">Almost Full</button>
                            <button class="btn" style="background:var(--full)" onclick="report('${l}','Completely Full')">Completely Full</button>
                        </div><br>`;
                });
                container.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
