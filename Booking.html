<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eatzwa Fades | Home</title>
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #111111;
            --primary-color: #ff0033; /* Barber Red */
            --text-main: #ffffff;
            --text-muted: #cccccc;
            --border-color: #222222;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Impact', 'Arial Black', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar Layout */
        nav {
            background-color: var(--surface-color);
            border-bottom: 2px solid var(--primary-color);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Hamburger Dropdown Menu Toggle (Top Left) */
        .menu-container {
            position: relative;
            margin-right: 20px;
        }

        .hamburger-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .hamburger-btn:focus {
            outline: none;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 140%;
            left: 0;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-top: 2px solid var(--primary-color);
            border-radius: 4px;
            width: 200px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .dropdown-menu a {
            color: var(--text-muted);
            text-decoration: none;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            padding: 14px 20px;
            display: block;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s, color 0.2s;
        }

        .dropdown-menu a:last-child {
            border-bottom: none;
        }

        .dropdown-menu a:hover, .dropdown-menu a.active {
            background-color: var(--bg-color);
            color: var(--primary-color);
        }

        /* Keep menu open when targeted or active */
        .menu-container.open .dropdown-menu {
            display: block;
        }

        .logo {
            color: var(--text-main);
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--primary-color);
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&q=80&w=1200') no-repeat center center/cover;
        }

        .hero h1 {
            font-size: 60px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .hero p {
            font-family: 'Arial', sans-serif;
            color: var(--text-muted);
            font-size: 18px;
            max-width: 600px;
            margin: 20px 0 30px;
        }

        .cta-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 4px;
            letter-spacing: 1px;
            transition: background 0.3s ease;
        }

        .cta-btn:hover {
            background-color: #cc0029;
        }

        footer {
            background-color: var(--surface-color);
            text-align: center;
            padding: 15px;
            font-family: 'Arial', sans-serif;
            font-size: 12px;
            color: #555;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu-container" id="menuContainer">
            <button class="hamburger-btn" onclick="toggleMenu()" aria-label="Toggle Menu">&#9776;</button>
            <div class="dropdown-menu">
                <a href="index.html" class="active">Home</a>
                <a href="news.html">News</a>
                <a href="about.html">About</a>
                <a href="Booking.html">Booking</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
        <div class="logo">Eatzwa <span>Fades</span></div>
    </nav>

    <div class="hero">
        <h1>Sharp Fades.<br>Crisp Line-ups.</h1>
        <p>No shortcuts. Just premium craftsmanship tailored specifically to your style. Step up your look today.</p>
        <a href="Booking.html" class="cta-btn">Book Your Chair</a>
    </div>

    <footer>
        &copy; 2026 Eatzwa Fades. All Rights Reserved.
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('menuContainer').classList.toggle('open');
        }

        // Close menu if user clicks anywhere outside of it
        window.addEventListener('click', function(e) {
            const container = document.getElementById('menuContainer');
            if (!container.contains(e.target)) {
                container.classList.remove('open');
            }
        });
    </script>
</body>
</html>
