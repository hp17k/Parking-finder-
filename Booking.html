<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eatzwa Fades | Booking</title>
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #111111;
            --primary-color: #ff0033;
            --text-main: #ffffff;
            --text-muted: #cccccc;
            --border-color: #222222;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        nav {
            background-color: var(--surface-color);
            border-bottom: 2px solid var(--primary-color);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            font-family: 'Impact', sans-serif;
        }

        .menu-container {
            position: relative;
            margin-right: 20px;
        }

        .hamburger-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 140%;
            left: 0;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-top: 2px solid var(--primary-color);
            border-radius: 4px;
            width: 200px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 200;
        }

        .dropdown-menu a {
            color: var(--text-muted);
            text-decoration: none;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            padding: 14px 20px;
            display: block;
            border-bottom: 1px solid var(--border-color);
        }

        .dropdown-menu a:hover, .dropdown-menu a.active {
            background-color: var(--bg-color);
            color: var(--primary-color);
        }

        .menu-container.open .dropdown-menu {
            display: block;
        }

        .logo { font-size: 24px; letter-spacing: 1px; text-transform: uppercase; }
        .logo span { color: var(--primary-color); }

        .container {
            max-width: 480px;
            margin: 40px auto;
            background-color: var(--surface-color);
            padding: 30px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        h2 { font-family: 'Impact', sans-serif; font-size: 32px; text-transform: uppercase; margin-top: 0; color: var(--primary-color); text-align: center; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; }
        
        select, input {
            width: 100%; padding: 14px; background-color: var(--bg-color); border: 1px solid var(--border-color);
            color: var(--text-main); border-radius: 6px; box-sizing: border-box; font-size: 16px;
        }
        select:focus, input:focus { outline: none; border-color: var(--primary-color); }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .submit-btn {
            width: 100%; padding: 16px; background-color: var(--primary-color); color: white; border: none;
            border-radius: 6px; font-size: 18px; font-weight: bold; text-transform: uppercase; cursor: pointer;
        }
        .submit-btn:hover { background-color: #cc0029; }

        .success-message { display: none; border: 1px solid #28a745; color: #28a745; padding: 15px; border-radius: 6px; text-align: center; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="menu-container" id="menuContainer">
            <button class="hamburger-btn" onclick="toggleMenu()">&#9776;</button>
            <div class="dropdown-menu">
                <a href="index.html">Home</a>
                <a href="news.html">News</a>
                <a href="about.html">About</a>
                <a href="Booking.html" class="active">Booking</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
        <div class="logo">Eatzwa <span>Fades</span></div>
    </nav>

    <div class="container">
        <h2>Book Your Chair</h2>
        <div id="successMessage" class="success-message">Booking locked in! We'll see you soon.</div>

        <form id="bookingForm" action="https://formspree.io/f/xnjyazzy" method="POST">
            <div class="form-group">
                <label for="service">Service</label>
                <select id="service" name="service" required>
                    <option value="" disabled selected>Choose your cut...</option>
                    <option value="Skin Fade">Skin Fade - $40</option>
                    <option value="Taper Fade">Taper Fade - $35</option>
                    <option value="Beard Line-Up">Beard Line-Up - $20</option>
                    <option value="Fade & Beard Combo">Fade & Beard Combo - $55</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="time">Time</label>
                <input type="time" id="time" name="time" required>
            </div>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="0400 000 000" required>
            </div>
            <button type="submit" class="submit-btn">Lock It In</button>
        </form>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('menuContainer').classList.toggle('open');
        }

        window.addEventListener('click', function(e) {
            const container = document.getElementById('menuContainer');
            if (!container.contains(e.target)) {
                container.classList.remove('open');
            }
        });

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').setAttribute('min', today);

        const form = document.getElementById('bookingForm');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                const response = await fetch(form.action, {
                    method: form.method,
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    const successMsg = document.getElementById('successMessage');
                    successMsg.style.display = 'block';
                    form.reset();
                    setTimeout(() => { successMsg.style.display = 'none'; }, 4000);
                }
            } catch (error) { console.error(error); }
        });
    </script>
</body>
</html>
