<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T8 Commuter Parking Pulse</title>
    <!-- Apple Web App Meta Tags to make it look like a native app -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Tailwind CSS for modern, slick interface styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased selection:bg-blue-500 pb-12">

    <!-- Header Dashboard -->
    <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50 px-4 py-3 shadow-md">
        <div class="max-w-md mx-auto flex flex-col gap-1">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold tracking-tight text-blue-400">T8 Parking Pulse</h1>
                <div id="weather" class="text-sm font-medium bg-slate-700 px-2.5 py-1 rounded-full text-slate-300">
                    Loading Weather...
                </div>
            </div>
            <div class="flex justify-between items-center text-xs text-slate-400 mt-1">
                <span id="live-clock">Loading Date & Time...</span>
                <span class="flex items-center gap-1 text-emerald-400 font-semibold bg-emerald-950/50 px-2 py-0.5 rounded border border-emerald-800">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                    T8 Line: Normal Service
                </span>
            </div>
        </div>
    </header>

    <!-- Main Content App Body -->
    <main class="max-w-md mx-auto px-4 mt-4 space-y-4">
        
        <!-- Station Cards Container -->
        <div id="stations-list" class="space-y-4">
            <!-- Stations will be dynamically generated here by JavaScript -->
        </div>

    </main>

    <!-- Interactive Status Update Drawer / Modal Overlay -->
    <div id="update-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden flex items-end transition-opacity duration-300">
        <div class="w-full bg-slate-800 rounded-t-2xl p-6 border-t border-slate-700 max-w-md mx-auto transform translate-y-0 transition-transform duration-300">
            <div class="w-12 h-1.5 bg-slate-600 rounded-full mx-auto mb-4"></div>
            <h3 id="modal-title" class="text-lg font-bold text-slate-200 mb-1">Update Parking</h3>
            <p class="text-xs text-slate-400 mb-4">Select the current occupancy status to update your fellow commuters in real time.</p>
            
            <div class="grid grid-cols-1 gap-2.5">
                <button onclick="submitStatus('A')" class="flex items-center justify-between w-full p-3.5 bg-emerald-950/40 border border-emerald-800 text-emerald-400 font-semibold rounded-xl active:bg-emerald-900/40 text-left">
                    <span>A: Empty / Plenty of spots</span>
                    <span class="w-3 h-3 rounded-full bg-emerald-400"></span>
                </button>
                <button onclick="submitStatus('B')" class="flex items-center justify-between w-full p-3.5 bg-cyan-950/40 border border-cyan-800 text-cyan-400 font-semibold rounded-xl active:bg-cyan-900/40 text-left">
                    <span>B: Fair few spaces left</span>
                    <span class="w-3 h-3 rounded-full bg-cyan-400"></span>
                </button>
                <button onclick="submitStatus('C')" class="flex items-center justify-between w-full p-3.5 bg-amber-950/40 border border-amber-800 text-amber-400 font-semibold rounded-xl active:bg-amber-900/40 text-left">
                    <span>C: Busy / Almost full</span>
                    <span class="w-3 h-3 rounded-full bg-amber-400"></span>
                </button>
                <button onclick="submitStatus('D')" class="flex items-center justify-between w-full p-3.5 bg-rose-950/40 border border-rose-800 text-rose-400 font-semibold rounded-xl active:bg-rose-900/40 text-left">
                    <span>D: Completely full / Had to leave</span>
                    <span class="w-3 h-3 rounded-full bg-rose-400"></span>
                </button>
                <button onclick="submitStatus('Blocked')" class="flex items-center justify-between w-full p-3.5 bg-slate-900 border border-slate-700 text-slate-400 font-semibold rounded-xl active:bg-slate-800 text-left">
                    <span>🚫 Parking Blocked / Closed</span>
                    <span class="w-3 h-3 rounded-full bg-slate-500"></span>
                </button>
            </div>
            
            <button onclick="closeModal()" class="w-full mt-4 py-3 bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium rounded-xl transition">
                Cancel
            </button>
        </div>
    </div>

    <!-- Core App Engine (JavaScript) -->
    <script>
        // Setup configuration for your 5 specific 100% free commuter car parks
        const stationsData = {
            macarthur: { name: "Macarthur Station", area: "Commuter Park&Ride", maps: "https://maps.app.goo.gl/uX73H7o8sW2uXy629" },
            campbelltown: { name: "Campbelltown Station", area: "Hurley St / Farrow Rd Park&Ride", maps: "https://maps.app.goo.gl/9yG2S1JmZz1h6w8E8" },
            leumeah: { name: "Leumeah Station", area: "Airds Rd Commuter Carpark", maps: "https://maps.app.goo.gl/XqLqYwZp5x7t6b7m9" },
            minto: { name: "Minto Station", area: "Minto Rd Commuter Carpark", maps: "https://maps.app.goo.gl/z6G7Yg1VvB8t4r9E2" },
            glenfield: { name: "Glenfield Station", area: "Railway Pde Park&Ride", maps: "https://maps.app.goo.gl/M5P8WvX1xY9z3b7Q4" }
        };

        // Free anonymous cloud database sync URL setup using kvdb.io to power real-time updates across multiple phones
        const dbBucket = "https://kvdb.io/T8ParkingPulse_2026_Live/";
        let activeStationId = null;

        // Initialize App UI Elements
        function initApp() {
            updateClock();
            setInterval(updateClock, 1000);
            fetchWeather();
            setInterval(fetchWeather, 900000); // Refresh weather every 15 mins
            renderStations();
            fetchAllStatuses();
            setInterval(fetchAllStatuses, 30000); // Auto refresh data every 30 seconds
        }

        // Live Clock & Date Engine
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            document.getElementById('live-clock').innerText = now.toLocaleString('en-AU', options);
        }

        // Live Free Weather Feed for Campbelltown/Leumeah region via Open-Meteo API
        async function fetchWeather() {
            try {
                const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-34.0654&longitude=150.8142&current=temperature_2m,weather_code");
                const data = await response.json();
                const temp = Math.round(data.current.temperature_2m);
                document.getElementById('weather').innerText = `☀️ Leumeah: ${temp}°C`;
            } catch (error) {
                document.getElementById('weather').innerText = `☀️ Fine & Mild`;
            }
        }

        // Generate the HTML code components for the Station Dashboards dynamically
        function renderStations() {
            const container = document.getElementById('stations-list');
            container.innerHTML = '';
            
            Object.keys(stationsData).forEach(id => {
                const station = stationsData[id];
                const card = document.createElement('div');
                card.className = "bg-slate-800 border border-slate-700/60 rounded-2xl p-4 shadow-sm flex flex-col justify-between transition-all duration-200 active:scale-[0.99]";
                card.id = `card-${id}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h2 class="text-lg font-bold text-white tracking-tight">${station.name}</h2>
                            <p class="text-xs text-slate-400 font-medium flex items-center gap-1 mt-0.5">
                                <svg class="w-3 h-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                ${station.area}
                            </p>
                        </div>
                        <div id="badge-${id}" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-slate-700 text-slate-400 border border-slate-600">
                            Checking...
                        </div>
                    </div>
                    
                    <div class="mt-4 pt-3 border-t border-slate-700/50 flex items-center justify-between text-xs text-slate-400">
                        <span id="time-${id}">Syncing data...</span>
                        <div class="flex gap-2">
                            <a href="${station.maps}" target="_blank" class="px-3.5 py-2 bg-slate-700 font-semibold text-slate-200 rounded-lg flex items-center gap-1 active:bg-slate-600">
                                Navigate
                            </a>
                            <button onclick="openModal('${id}')" class="px-3.5 py-2 bg-blue-600 font-semibold text-white rounded-lg active:bg-blue-700">
                                Update Status
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Status Dictionary Configuration
        const statusConfig = {
            'A': { text: 'Empty / Available', textClass: 'text-emerald-400', bgClass: 'bg-emerald-950/60', borderClass: 'border-emerald-800' },
            'B': { text: 'Fair Few Spots Left', textClass: 'text-cyan-400', bgClass: 'bg-cyan-950/60', borderClass: 'border-cyan-800' },
            'C': { text: 'Almost Full', textClass: 'text-amber-400', bgClass: 'bg-amber-950/60', borderClass: 'border-amber-800' },
            'D': { text: 'Completely Full', textClass: 'text-rose-400', bgClass: 'bg-rose-950/60', borderClass: 'border-rose-800' },
            'Blocked': { text: 'Blocked / Closed', textClass: 'text-slate-400', bgClass: 'bg-slate-900', borderClass: 'border-slate-700' }
        };

        // Real-Time Database Reader Engine
        async function fetchAllStatuses() {
            Object.keys(stationsData).forEach(async (id) => {
                try {
                    const res = await fetch(`${dbBucket}${id}`);
                    if (!res.ok) throw new Error('New Location Setup');
                    const data = await res.json();
                    applyStatusUpdate(id, data.status, data.time);
                } catch (e) {
                    applyStatusUpdate(id, 'A', 'No recent reports');
                }
            });
        }

        // Apply Status Data Changes cleanly to UI
        function applyStatusUpdate(id, status, timeString) {
            const badge = document.getElementById(`badge-${id}`);
            const timeSpan = document.getElementById(`time-${id}`);
            const card = document.getElementById(`card-${id}`);
            const config = statusConfig[status] || statusConfig['A'];

            badge.innerText = status === 'Blocked' ? '⚠️ Blocked' : `Status ${status}`;
            badge.className = `px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${config.textClass} ${config.bgClass} border ${config.borderClass}`;
            timeSpan.innerText = timeString === 'No recent reports' ? timeString : `Updated: ${timeString}`;
            
            card.className = `bg-slate-800 border ${config.borderClass}/40 rounded-2xl p-4 shadow-sm flex flex-col justify-between transition-all duration-200`;
        }

        // Open Modal Controls
        function openModal(id) {
            activeStationId = id;
            document.getElementById('modal-title').innerText = `Update ${stationsData[id].name}`;
            const modal = document.getElementById('update-modal');
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('update-modal').classList.add('hidden');
            activeStationId = null;
        }

        // Real-Time Database Writer Engine
        async function submitStatus(statusCode) {
            if (!activeStationId) return;
            
            const timeNow = new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', hour12: true });
            const payload = { status: statusCode, time: timeNow };

            // Update local view instantly for high-speed feel
            applyStatusUpdate(activeStationId, statusCode, timeNow);
            closeModal();

            // Fire and sync backend anonymously over the cloud
            try {
                await fetch(`${dbBucket}${activeStationId}`, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch (error) {
                console.log('Network sync delayed, updated locally.');
            }
        }

        // App initialization execution
        window.onload = initApp;
    </script>
</body>
</html>
